<!doctype html>
<html lang="en-us" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge,chrome=1" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Universal LPC Sprite Sheet Character Generator</title>
  </head>
  <body>
    <div class="ambient-backdrop" aria-hidden="true">
      <div class="ambient-parallax ambient-parallax--far"></div>
      <div class="ambient-parallax ambient-parallax--mid"></div>
      <div class="ambient-runes"></div>
      <canvas id="ambient-particles"></canvas>
    </div>
    <a class="skip-link btn btn-warning fw-semibold" href="#main-content"
      >Skip to sprite generator</a
    >
    <div class="app-shell">
      <header id="header-left" class="app-topbar sticky-top" role="banner">
        <nav class="container-fluid py-3" aria-label="Primary">
          <div
            class="d-flex align-items-center justify-content-between flex-wrap gap-3"
          >
            <div class="d-flex align-items-center flex-wrap gap-3">
              <h1 class="app-brand h4 mb-0 d-flex align-items-center gap-2">
                <i class="bi bi-stars app-brand__mark" aria-hidden="true"></i>
                <span>Universal LPC Spritesheet Generator</span>
              </h1>
            </div>
            <div id="navigation-menus-root"></div>
          </div>
        </nav>
      </header>

      <main id="main-content" class="container-fluid py-4" tabindex="-1">
        <div id="columns-container" class="row g-4 align-items-start">
          <section
            id="preview-column"
            class="col-12 col-xl-5 order-xl-2 app-region"
            aria-labelledby="preview-stage-title"
          >
            <div class="app-stage app-workspace">
              <div
                class="app-panel app-panel--parchment p-3 character-preview-stage"
              >
                <h2 id="preview-stage-title" class="app-region-title h5 mb-3">
                  <i
                    class="bi bi-person-bounding-box me-2"
                    aria-hidden="true"
                  ></i
                  >Character preview stage
                </h2>
                <div id="mithril-preview" class="loading"></div>
              </div>
              <div class="app-panel p-3 character-summary">
                <h2 class="app-region-title h5 mb-3">
                  <i class="bi bi-card-list me-2" aria-hidden="true"></i
                  >Character summary
                </h2>
                <div id="mithril-spritesheet-preview" class="loading"></div>
              </div>
            </div>
          </section>

          <section
            id="chooser-column"
            class="col-12 col-xl-7 order-xl-1 app-region customization-workspace"
            aria-labelledby="workspace-title"
          >
            <div class="app-panel p-3 p-lg-4">
              <h2 id="workspace-title" class="app-region-title h5 mb-3">
                <i class="bi bi-sliders me-2" aria-hidden="true"></i
                >Customization workspace
              </h2>
              <div class="row g-3">
                <nav
                  class="col-12 category-navigation"
                  aria-label="Category navigation"
                >
                  <div class="visually-hidden">
                    Category navigation is provided by the filters and category
                    tree below.
                  </div>
                </nav>
                <section class="col-12 item-browser" aria-label="Item browser">
                  <div id="mithril-filters" class="loading"></div>
                </section>
                <section
                  class="col-12 export-controls"
                  aria-label="Export controls"
                >
                  <div class="visually-hidden">
                    Export controls remain in the generator controls while the
                    Bootstrap shell is introduced.
                  </div>
                </section>
              </div>
            </div>
          </section>
        </div>
      </main>
    </div>
    <script type="module" src="sources/main.ts"></script>
  </body>
</html>
